<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag Demo</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc; /* slate-50 */
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Der Mast (optional, sieht aber realistischer aus) */
    .pole {
      width: 8px;
      height: 400px;
      background: linear-gradient(to right, #ccc, #fff, #999);
      border-radius: 4px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
      position: relative;
    }

    /* Der Container sorgt für die 3D-Perspektive */
    .flag-container {
      perspective: 1000px;
      width: 250px;
      height: 166px;
      position: absolute;
      top: 10px;
      left: 4px; /* An den Mast hängen */
      z-index: 10;
    }

    /* Die Flagge selbst */
    .flag-wave {
      width: 100%;
      height: 100%;
      background: url('https://flagcdn.com/w320/gr.png') no-repeat center/cover;
      /* Der Ankerpunkt der Animation ist links am Mast */
      transform-origin: center left;
      /* Animation für das Hin- und Herschwingen */
      animation: flag-flap 1.2s ease-in-out infinite alternate;
      position: relative;
      border-radius: 0 4px 4px 0;
      box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
    }

    /* Das Overlay simuliert den Schattenwurf der Falten im Wind */
    .flag-wave::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        90deg, 
        rgba(255,255,255,0.0) 0%, 
        rgba(0,0,0,0.15) 30%, 
        rgba(255,255,255,0.1) 60%,
        rgba(0,0,0,0.1) 100%
      );
      background-size: 200% 100%;
      /* Der Schatten bewegt sich entgegengesetzt zur Welle */
      animation: shadow-move 1.2s ease-in-out infinite alternate;
      border-radius: 0 4px 4px 0;
    }

    @keyframes flag-flap {
      0% { transform: rotateY(20deg) rotateZ(-3deg) scaleX(0.95); }
      100% { transform: rotateY(-20deg) rotateZ(3deg) scaleX(1); }
    }

    @keyframes shadow-move {
      0% { background-position: 100% 0; }
      100% { background-position: 0 0; }
    }

    .info {
      position: absolute;
      bottom: 40px;
      text-align: center;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="pole">
    <div class="flag-container">
      <div class="flag-wave"></div>
    </div>
  </div>

  <div class="info">
    <h2>CSS 3D Flag Animation</h2>
    <p>Nur pures CSS. Kein schweres Video oder GIF.</p>
  </div>

</body>
</html>
